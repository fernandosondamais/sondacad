services:
  - type: web
    name: sondacad
    runtime: static
    buildCommand: echo "Site estatico SONDACAD pronto para publicacao"
    staticPublishPath: .
    headers:
      - path: /**
        name: X-Content-Type-Options
        value: nosniff
      - path: /**
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/**
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /**/*.mjs
        name: Content-Type
        value: application/javascript; charset=utf-8
